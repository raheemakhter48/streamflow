name: Deploy Backend to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "backend/**"
      - ".github/workflows/deploy-hf-streamhub.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare backend-only Space repo
        run: |
          rm -rf hf-space
          mkdir -p hf-space/backend
          cp Dockerfile hf-space/Dockerfile
          cp -R backend/. hf-space/backend/
          rm -rf hf-space/backend/node_modules
          rm -f hf-space/backend/.env
          cat > hf-space/README.md <<'EOF'
          ---
          title: StreamHub Backend
          emoji: 📺
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          pinned: false
          ---

          # StreamHub Backend

          Node.js Express backend for StreamHub IPTV APIs.
          EOF

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: raheemakhter
          HF_SPACE: streamhub
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is missing. Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi

          cd hf-space
          git init
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git checkout -b main
          git add .
          git commit -m "Deploy backend from GitHub Actions"
          git remote add hf "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE"
          git push --force hf main
