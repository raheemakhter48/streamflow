services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: streamflow-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 7860
    ports:
      - "127.0.0.1:7860:7860"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:7860/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
